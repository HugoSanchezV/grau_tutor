services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: chess-tutor-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_HOST=chromadb
    volumes:
      - ./data:/app/data
      - ./db:/app/db  # Persistencia para SQLite
      - ./app:/app/app
      - ./agents:/app/agents
      - ./core:/app/core
      - ./rag:/app/rag
    depends_on:
      - chromadb

  chromadb:
    image: chromadb/chroma:latest
    container_name: chess-tutor-vectorstore
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chroma-data: